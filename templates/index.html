<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hybrid AI Vitamin Chatbot</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <header>

            <h1>🥗 Hybrid AI Vitamin Chatbot</h1>

            <p>
                Ask questions about vitamin deficiencies, nutrition,
                supplements, and general health education.
            </p>

        </header>

        <main id="chat-container">

            <div class="message bot">

                <div class="message-content">

                    👋 Hello!

                    <br><br>

                    I'm your Hybrid AI Vitamin Chatbot.

                    <br><br>

                    Ask me anything about:

                    <ul>

                        <li>Vitamin deficiencies</li>

                        <li>Minerals</li>

                        <li>Nutrition</li>

                        <li>Supplements</li>

                        <li>General health education</li>

                    </ul>

                </div>

            </div>

        </main>

        <footer>

            <div class="input-area">

                <input
                    type="text"
                    id="user-input"
                    placeholder="Type your question here..."
                    autocomplete="off"
                >

                <button id="send-button">
                    Send
                </button>

            </div>

        </footer>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
